<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="rc">
      <circle cx="300" cy="300" r="280"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rc)">

    <!-- Sweep wedge — trailing glow behind sweep line -->
    <path d="M 300 300 L 182 46 A 280 280 0 0 1 498 102 Z"
          fill="#3663C1" fill-opacity="0.06"/>

    <!-- Inner rings -->
    <circle cx="300" cy="300" r="224" fill="none" stroke="#030C2C" stroke-width="0.75" stroke-opacity="0.1"/>
    <circle cx="300" cy="300" r="168" fill="none" stroke="#030C2C" stroke-width="0.75" stroke-opacity="0.1"/>
    <circle cx="300" cy="300" r="112" fill="none" stroke="#030C2C" stroke-width="0.75" stroke-opacity="0.1"/>
    <circle cx="300" cy="300" r="56"  fill="none" stroke="#030C2C" stroke-width="0.75" stroke-opacity="0.1"/>

    <!-- Crosshair -->
    <line x1="20"  y1="300" x2="580" y2="300" stroke="#030C2C" stroke-width="0.75" stroke-opacity="0.1"/>
    <line x1="300" y1="20"  x2="300" y2="580" stroke="#030C2C" stroke-width="0.75" stroke-opacity="0.1"/>

    <!-- 45° diagonals -->
    <line x1="102" y1="102" x2="498" y2="498" stroke="#030C2C" stroke-width="0.5" stroke-opacity="0.07"/>
    <line x1="498" y1="102" x2="102" y2="498" stroke="#030C2C" stroke-width="0.5" stroke-opacity="0.07"/>

    <!-- Tick marks every 30° (inner r=272, outer r=280) -->
    <line x1="580"   y1="300"   x2="572"   y2="300"   stroke="#030C2C" stroke-width="1" stroke-opacity="0.18"/>
    <line x1="542.5" y1="440"   x2="535.6" y2="436"   stroke="#030C2C" stroke-width="1" stroke-opacity="0.18"/>
    <line x1="440"   y1="542.5" x2="436"   y2="535.6" stroke="#030C2C" stroke-width="1" stroke-opacity="0.18"/>
    <line x1="300"   y1="580"   x2="300"   y2="572"   stroke="#030C2C" stroke-width="1" stroke-opacity="0.18"/>
    <line x1="160"   y1="542.5" x2="164"   y2="535.6" stroke="#030C2C" stroke-width="1" stroke-opacity="0.18"/>
    <line x1="57.5"  y1="440"   x2="64.4"  y2="436"   stroke="#030C2C" stroke-width="1" stroke-opacity="0.18"/>
    <line x1="20"    y1="300"   x2="28"    y2="300"   stroke="#030C2C" stroke-width="1" stroke-opacity="0.18"/>
    <line x1="57.5"  y1="160"   x2="64.4"  y2="164"   stroke="#030C2C" stroke-width="1" stroke-opacity="0.18"/>
    <line x1="160"   y1="57.5"  x2="164"   y2="64.4"  stroke="#030C2C" stroke-width="1" stroke-opacity="0.18"/>
    <line x1="300"   y1="20"    x2="300"   y2="28"    stroke="#030C2C" stroke-width="1" stroke-opacity="0.18"/>
    <line x1="440"   y1="57.5"  x2="436"   y2="64.4"  stroke="#030C2C" stroke-width="1" stroke-opacity="0.18"/>
    <line x1="542.5" y1="160"   x2="535.6" y2="164"   stroke="#030C2C" stroke-width="1" stroke-opacity="0.18"/>

    <!-- Sweep line (pointing upper-right, ~315°) -->
    <line x1="300" y1="300" x2="498" y2="102"
          stroke="#3663C1" stroke-width="1.5" stroke-opacity="0.55"/>

    <!-- Blip dots -->
    <circle cx="430" cy="162" r="5"   fill="#3663C1" fill-opacity="0.65"/>
    <circle cx="372" cy="342" r="3.5" fill="#3663C1" fill-opacity="0.4"/>
    <circle cx="248" cy="268" r="4"   fill="#3663C1" fill-opacity="0.28"/>
    <circle cx="352" cy="178" r="2.5" fill="#3663C1" fill-opacity="0.22"/>

    <!-- Center dot -->
    <circle cx="300" cy="300" r="3" fill="#030C2C" fill-opacity="0.25"/>

  </g>

  <!-- Outer border (drawn outside clip so full stroke is visible) -->
  <circle cx="300" cy="300" r="280"
          fill="none" stroke="#030C2C" stroke-width="1.5" stroke-opacity="0.2"/>
</svg>
