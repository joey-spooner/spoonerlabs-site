<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Spooner Labs{% endblock %}</title>
  <meta name="description" content="{% block description %}Experiments and thoughts in systems, technology, organizations, and whatever else is worth exploring.{% endblock %}">
  <meta property="og:title" content="{% block og_title %}Spooner Labs{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Experiments and thoughts in systems, technology, organizations, and whatever else is worth exploring.{% endblock %}">
  <meta property="og:type" content="website">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="{{ site.css_path }}">
</head>
<body>

  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <nav class="site-nav" aria-label="Main navigation">
    <div class="container">
      <div class="site-nav__inner">
        <a href="/" class="site-nav__logo"><img src="{{ site.logo_path }}" alt="Spooner Labs"></a>
        <ul class="site-nav__links">
          <li><a href="/experiments/" {% if active_page == 'experiments' %}aria-current="page"{% endif %}>Experiments</a></li>
          <li><a href="/projects/" {% if active_page == 'projects' %}aria-current="page"{% endif %}>Projects</a></li>
          <li><a href="/speaking.html" {% if active_page == 'speaking' %}aria-current="page"{% endif %}>Speaking</a></li>
          <li><a href="/about.html" {% if active_page == 'about' %}aria-current="page"{% endif %}>About</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="site-footer__inner">
        <p class="site-footer__copy">&copy; <span id="yr"></span> Spooner Labs</p>
        <ul class="site-footer__links">
          <li><a href="/experiments/">Experiments</a></li>
          <li><a href="/projects/">Projects</a></li>
          <li><a href="/speaking.html">Speaking</a></li>
          <li><a href="/about.html">About</a></li>
          <li><a href="/contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </footer>

  <script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
  <script src="/bg.js"></script>
</body>
</html>
