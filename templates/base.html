<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Spooner Labs{% endblock %}</title>
  <meta name="description" content="{% block description %}Experiments and thoughts in systems, technology, organizations, and whatever else is worth exploring.{% endblock %}">
  <meta property="og:title" content="{% block og_title %}Spooner Labs{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Experiments and thoughts in systems, technology, organizations, and whatever else is worth exploring.{% endblock %}">
  <meta property="og:type" content="website">
  <link rel="icon" href="/assets/brand/spoonerlabs-icon-clean.ico" sizes="any">
  <link rel="icon" type="image/png" href="/assets/brand/spoonerlabs-icon-clean.png">
  <link rel="stylesheet" href="{{ site.css_path }}">
</head>
<body>

  <nav class="site-nav" aria-label="Main navigation">
    <div class="container">
      <div class="site-nav__inner">
        <a href="/" class="site-nav__logo"><img src="/assets/images/logo-from-design.png" alt="Spooner Labs"></a>
        <ul class="site-nav__links">
          <li><a href="/experiments/" {% if active_page == 'experiments' %}aria-current="page"{% endif %}>Experiments</a></li>
          <li><a href="/projects/" {% if active_page == 'projects' %}aria-current="page"{% endif %}>Projects</a></li>
          <li><a href="/about.html" {% if active_page == 'about' %}aria-current="page"{% endif %}>About</a></li>
        </ul>
        <button class="site-nav__toggle" aria-label="Open menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="site-footer__bottom">
        <p class="site-footer__copy">&copy; <span id="yr"></span> Spooner Labs</p>
        <ul class="site-footer__links">
          <li><a href="/contact.html">Contact</a></li>
          <li><a href="https://evolvingorgs.com">Evolving Orgs ↗</a></li>
        </ul>
        <div class="site-footer__social">
          <a href="https://linkedin.com/in/joey-spooner" aria-label="LinkedIn" class="site-footer__social-link">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M16.5 0h-15C.675 0 0 .675 0 1.5v15C0 17.325.675 18 1.5 18h15c.825 0 1.5-.675 1.5-1.5v-15C18 .675 17.325 0 16.5 0zM5.25 15.375H2.625V6.75H5.25v8.625zM3.938 5.625a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm11.437 9.75h-2.625V11.25c0-.975-.375-1.5-1.125-1.5-.75 0-1.125.525-1.125 1.5v4.125H7.875V6.75H10.5v1.125c.375-.75 1.125-1.125 2.25-1.125 1.5 0 2.625 1.125 2.625 3.375v5.25z"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
  <script>(function(){var t=document.querySelector('.site-nav__toggle'),l=document.querySelector('.site-nav__links');if(t)t.addEventListener('click',function(){var o=l.classList.toggle('is-open');this.setAttribute('aria-expanded',o);this.setAttribute('aria-label',o?'Close menu':'Open menu');});})();</script>
</body>
</html>
